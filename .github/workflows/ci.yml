name: CI and Deploy

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install "poetry==1.8.4"

      - name: Install backend dependencies
        run: poetry install --no-interaction --no-ansi --no-root

      - name: Run unit tests
        run: poetry run python -m unittest discover -s tests -v
        env:
          OPENAI_API_KEY: test-key
          TAVILY_API_KEY: test-key
          DATABASE_URL: ""
          REDIS_URL: ""
          SEARCH_RATE_LIMIT_ENABLED: "false"
          GLOBAL_DAILY_QUOTA_ENABLED: "false"

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  deploy:
    name: Deploy to Lightsail
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploying application via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            cd /var/www/AiCrateDigger

            # Pull the latest code from GitHub
            git pull origin main

            # Restart the application without shutting down the entire system
            docker compose -f docker-compose.prod.yml up --build -d

            # Clean up old unused Docker build images to prevent disk fill
            docker image prune -f
