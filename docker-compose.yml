services:

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aicratedigger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aicratedigger}
      POSTGRES_DB: ${POSTGRES_DB:-aicratedigger}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 8
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      DISCOGS_TOKEN: ${DISCOGS_TOKEN:-}
      # Matches app.db.database: async SQLAlchemy + asyncpg (host `db` = Compose service name)
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://aicratedigger:aicratedigger@db:5432/aicratedigger}
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_db:/app/chroma_db
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://backend:8000}
      # Bind mounts often miss file events on Docker Desktop — polling makes `next dev` pick up saves
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      # Live code from host; refresh / Fast Refresh without rebuilding the image
      - ./frontend:/app
      # Keep deps and build cache inside the container (avoid empty host node_modules / arch mismatch)
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  pgdata: