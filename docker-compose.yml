version: "3.9"

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      DISCOGS_TOKEN: ${DISCOGS_TOKEN:-}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://aicratedigger:aicratedigger@db:5432/aicratedigger}
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_db:/app/chroma_db


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://backend:8000}
      # Bind mounts often miss file events on Docker Desktop — polling makes `next dev` pick up saves
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      # Live code from host; refresh / Fast Refresh without rebuilding the image
      - ./frontend:/app
      # Keep deps and build cache inside the container (avoid empty host node_modules / arch mismatch)
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend