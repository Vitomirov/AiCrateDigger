# All service credentials and URLs come from the repo-root `.env` (see `.env.example`).
# No connection strings are hardcoded here — copy `.env.example` → `.env` before `docker compose up`.

services:

  db:
    image: postgres:15-alpine
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 8
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--appendonly", "no"]
    volumes:
      - redisdata:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 8
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    # Reachable on the Compose network only (frontend uses BACKEND_URL=http://backend:8000).
    # For host debugging, uncomment:
    # ports:
    #   - "127.0.0.1:8000:8000"
    expose:
      - "8000"
    volumes:
      - ./backend/app:/app/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  eval:
    profiles: ["eval"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    command: ["python", "-m", "eval.cli"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_started

volumes:
  pgdata:
  redisdata:
